BASE: ['']
# python main.py --config_file ./configs/train_configs/Daily_Daily_Daily_TSCAN_try.yaml
#
# === SPLIT STRATEGY ===
# Subject split is handled INSIDE AyaLoader.py (not via BEGIN/END).
#   TRAIN subjects: [0, 1, 2, 3, 6, 8, 9, 10]
#   TEST subjects:  [4, 5, 7]
# BEGIN=0.0, END=1.0 for all splits — AyaLoader ignores these values.
# Condition filtering (distance, motion, lux) is also in AyaLoader.py.
#
TOOLBOX_MODE: "only_test"
TRAIN:
  BATCH_SIZE: 4
  EPOCHS: 30
  LR: 1e-4
  MODEL_FILE_NAME: Aya_Aya_TSCAN_1m_v2
  PLOT_LOSSES_AND_LR: True
  DATA:
    FS: 50
    DATASET: Aya
    DO_PREPROCESS: False
    DATA_FORMAT: NDCHW
    DATA_PATH: "E:/rppg_dataset"
    CACHED_PATH: "D:/PreprocessedTemp/Aya_12Stationary_train"
    EXP_DATA_NAME: ""
    BEGIN: 0.0
    END: 1.0
    PREPROCESS:
      DATA_TYPE: ['DiffNormalized', 'Standardized']
      DATA_AUG: ['None']
      LABEL_TYPE: DiffNormalized
      DO_CHUNK: True
      CHUNK_LENGTH: 300
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'HC'
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: False
          DYNAMIC_DETECTION_FREQUENCY: 30
          USE_MEDIAN_FACE_BOX: False
      RESIZE:
        H: 72
        W: 72
VALID:
  DATA:
    FS: 50
    DATASET: Aya
    DO_PREPROCESS: False
    DATA_FORMAT: NDCHW
    DATA_PATH: "E:/rppg_dataset"
    CACHED_PATH: "D:/PreprocessedTemp/Aya_12Stationary_valid"
    EXP_DATA_NAME: ""
    BEGIN: 0.0
    END: 1.0
    PREPROCESS:
      DATA_TYPE: ['DiffNormalized', 'Standardized']
      DATA_AUG: ['None']
      LABEL_TYPE: DiffNormalized
      DO_CHUNK: True
      CHUNK_LENGTH: 300
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'HC'
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: False
          DYNAMIC_DETECTION_FREQUENCY: 30
          USE_MEDIAN_FACE_BOX: False
      RESIZE:
        H: 72
        W: 72
TEST:
  METRICS: ['MAE', 'RMSE', 'MAPE', 'Pearson', 'SNR', 'BA']
  USE_LAST_EPOCH: False
  DATA:
    FS: 50
    DATASET: Aya
    DO_PREPROCESS: True
    DATA_FORMAT: NDCHW
    DATA_PATH: "E:/rppg_dataset"
    CACHED_PATH: "D:/PreprocessedTemp/Aya_12Stationary_test"
    EXP_DATA_NAME: ""
    BEGIN: 0.0
    END: 1.0
    PREPROCESS:
      DATA_TYPE: ['DiffNormalized', 'Standardized']
      DATA_AUG: ['None']
      LABEL_TYPE: DiffNormalized
      DO_CHUNK: True
      CHUNK_LENGTH: 300
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'INSIGHT'
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: False
          DYNAMIC_DETECTION_FREQUENCY: 30
          USE_MEDIAN_FACE_BOX: False
      RESIZE:
        H: 72
        W: 72
DEVICE: cuda:0
NUM_OF_GPU_TRAIN: 1
LOG:
  PATH: runs/exp
MODEL:
  DROP_RATE: 0.2
  NAME: Tscan
  TSCAN:
    FRAME_DEPTH: 20
INFERENCE:
  BATCH_SIZE: 4
  EVALUATION_METHOD: "FFT"
  EVALUATION_WINDOW:
    USE_SMALLER_WINDOW: False
    WINDOW_SIZE: 10
  MODEL_PATH: "runs/exp/Aya_SizeW72_SizeH72_ClipLength300_DataTypeDiffNormalized_Standardized_DataAugNone_LabelTypeDiffNormalized_Crop_faceTrue_BackendINSIGHT_Large_boxTrue_Large_size1.5_Dyamic_DetFalse_det_len30_Median_face_boxFalse/PreTrainedModels/Aya_Aya_TSCAN_1m_v2_Epoch18.pth"
