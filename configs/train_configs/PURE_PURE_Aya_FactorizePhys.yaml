BASE: ['']
# ============================================================================
# Train: PURE @ 30 fps   (split 0.0-0.8 train, 0.8-1.0 valid)
# Test:  MMPD @ 30 fps   (with INFO/condition filtering)
# Model: FactorizePhys (Standard, FSAM enabled)
# ----------------------------------------------------------------------------
# IMPORTANT vs TSCAN:
#   - DATA_TYPE must be ['Raw']         (FactorizePhys does diff internally)
#   - LABEL_TYPE must be Standardized
#   - CHUNK_LENGTH must equal MODEL.FactorizePhys.FRAME_NUM (here: 160)
#   - BACKEND='Y5F' is what the paper/official configs use
#   - Top-level keys (LOG, MODEL, INFERENCE) MUST be flush left (zero indent)
# ============================================================================
TOOLBOX_MODE: "train_and_test"
TRAIN:
  BATCH_SIZE: 4
  EPOCHS: 30
  LR: 9e-3
  MODEL_FILE_NAME: PURE_PURE_MMPD_factorizephys
  PLOT_LOSSES_AND_LR: True
  DATA:
    FS: 30
    DATASET: PURE
    DO_PREPROCESS: False
    DATA_FORMAT: NCDHW
    DATA_PATH: "D:/PURE"
    CACHED_PATH: "D:/rppg_cache_factorizephys"
    EXP_DATA_NAME: ""
    BEGIN: 0.0
    END: 0.8
    PREPROCESS:
      DATA_TYPE: ['Raw']
      DATA_AUG: ['None']
      LABEL_TYPE: Standardized
      DO_CHUNK: True
      CHUNK_LENGTH: 160
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'Y5F'
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: True
          DYNAMIC_DETECTION_FREQUENCY: 30
          USE_MEDIAN_FACE_BOX: False
      RESIZE:
        H: 72
        W: 72
VALID:
  DATA:
    FS: 30
    DATASET: PURE
    DO_PREPROCESS: FALSE
    DATA_FORMAT: NCDHW
    DATA_PATH: "D:/PURE"
    CACHED_PATH: "D:/rppg_cache_factorizephys"
    EXP_DATA_NAME: ""
    BEGIN: 0.8
    END: 1.0
    PREPROCESS:
      DATA_TYPE: ['Raw']
      LABEL_TYPE: Standardized
      DO_CHUNK: True
      CHUNK_LENGTH: 160
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'Y5F'
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: True
          DYNAMIC_DETECTION_FREQUENCY: 30
          USE_MEDIAN_FACE_BOX: False
      RESIZE:
        H: 72
        W: 72
TEST:
  METRICS: ['MAE', 'RMSE', 'MAPE', 'MACC', 'Pearson', 'SNR', 'BA']   # added MACC (official config uses it)
  USE_LAST_EPOCH: True                       # official FactorizePhys configs use last epoch, not best valid
  DATA:
    FS: 50
    DATASET: Aya
    DO_PREPROCESS: True
    DATA_FORMAT: NCDHW
    DATA_PATH: "E:/rppg_dataset"
    CACHED_PATH: "D:/PreprocessedData/Aya_factorizephys_test"
    EXP_DATA_NAME: ""
    BEGIN: 0.0
    END: 1.0
    PREPROCESS:
      DATA_TYPE: ['Raw']
      DATA_AUG: ['None']
      LABEL_TYPE: Standardized
      DO_CHUNK: True
      CHUNK_LENGTH: 160
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'INSIGHT'
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: False
          DYNAMIC_DETECTION_FREQUENCY: 30
          USE_MEDIAN_FACE_BOX: False
      RESIZE:
        H: 72
        W: 72
DEVICE: cuda:0
NUM_OF_GPU_TRAIN: 1
LOG:
  PATH: runs/factorizephys
MODEL:
  DROP_RATE: 0.1                             # FactorizePhys official configs use 0.1 (vs 0.2 for DeepPhys)
  NAME: FactorizePhys                        # changed from DeepPhys
  FactorizePhys:                             # NEW sub-block required for FactorizePhys
    TYPE: "Standard"                         # "Standard" (72x72, 160 frames) or "Big" (128x128, 240 frames)
    CHANNELS: 3                              # RGB input
    FRAME_NUM: 160                           # must match CHUNK_LENGTH above
    MD_FSAM: True                            # enable Factorized Self-Attention Module (paper's main contribution)
    MD_TYPE: "NMF"                           # matrix factorization type
    MD_TRANSFORM: "T_KAB"                    # default
    MD_R: 1
    MD_S: 1
    MD_STEPS: 4
    MD_INFERENCE: True                       # run FSAM at inference time too
    MD_RESIDUAL: True                        # residual connection around FSAM ("FSAM_Res" variant)
INFERENCE:
  BATCH_SIZE: 4
  EVALUATION_METHOD: "FFT"
  EVALUATION_WINDOW:
    USE_SMALLER_WINDOW: False
    WINDOW_SIZE: 10
  MODEL_PATH: "runs/factorizephys\PURE_SizeW72_SizeH72_ClipLength160_DataTypeRaw_DataAugNone_LabelTypeStandardized_Crop_faceTrue_BackendY5F_Large_boxTrue_Large_size1.5_Dyamic_DetTrue_det_len30_Median_face_boxFalse\PreTrainedModels\PURE_PURE_MMPD_factorizephys_Epoch29.pth"