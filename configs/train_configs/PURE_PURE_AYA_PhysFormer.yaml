BASE: ['']
# python main.py --config_file ./configs/train_configs/PURE_PURE_AYA_PhysFormer.yaml
#
# === STRATEGY ===
# TRAIN: PURE  (BEGIN 0.0 - END 0.8)
# VALID: PURE  (BEGIN 0.8 - END 1.0)
# TEST:  Aya   (subject split handled inside AyaLoader.py; BEGIN/END ignored)
#
TOOLBOX_MODE: "train_and_test"      # "train_and_test"  or "only_test"
TRAIN:
  BATCH_SIZE: 4
  EPOCHS: 30
  LR: 1e-4
  MODEL_FILE_NAME: PURE_AYA_physformer
  PLOT_LOSSES_AND_LR: True
  DATA:
    FS: 30
    DATASET: PURE
    DO_PREPROCESS: True                # set True the first time you preprocess
    DATA_FORMAT: NCDHW
    DATA_PATH: "D:/PURE"                     # Raw dataset path
    CACHED_PATH: "D:/rppg_cache_PhysFormer"  # Processed dataset save path
    EXP_DATA_NAME: ""
    BEGIN: 0.0
    END: 0.8
    PREPROCESS:
      DATA_TYPE: ['DiffNormalized']
      DATA_AUG: ['None']
      LABEL_TYPE: DiffNormalized
      DO_CHUNK: True
      CHUNK_LENGTH: 160
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'HC'
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: False
          DYNAMIC_DETECTION_FREQUENCY: 30
          USE_MEDIAN_FACE_BOX: False
      RESIZE:
        H: 128
        W: 128
VALID:
  DATA:
    FS: 30
    DATASET: PURE
    DO_PREPROCESS: True
    DATA_FORMAT: NCDHW
    DATA_PATH: "D:/PURE"                     # Raw dataset path
    CACHED_PATH: "D:/rppg_cache_PhysFormer"  # Processed dataset save path
    EXP_DATA_NAME: ""
    BEGIN: 0.8
    END: 1.0
    PREPROCESS:
      DATA_TYPE: ['DiffNormalized']
      DATA_AUG: ['None']
      LABEL_TYPE: DiffNormalized
      DO_CHUNK: True
      CHUNK_LENGTH: 160
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'HC'
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: False
          DYNAMIC_DETECTION_FREQUENCY: 30
          USE_MEDIAN_FACE_BOX: False
      RESIZE:
        H: 128
        W: 128
TEST:
  METRICS: ['MAE', 'RMSE', 'MAPE', 'Pearson', 'SNR', 'BA']
  USE_LAST_EPOCH: False
  DATA:
    FS: 50                                  # Aya is 50 fps
    DATASET: Aya
    DO_PREPROCESS: True                     # set False after the first run to reuse the cache
    DATA_FORMAT: NCDHW
    DATA_PATH: "E:/rppg_dataset"            # raw Aya path
    CACHED_PATH: "D:/PreprocessedData/Aya_v2_test_PhysFormer"
    EXP_DATA_NAME: ""
    BEGIN: 0.0                              # AyaLoader handles subject split internally
    END: 1.0
    PREPROCESS:
      DATA_TYPE: ['DiffNormalized']         # must match the model's training input type
      LABEL_TYPE: DiffNormalized
      DO_CHUNK: True
      CHUNK_LENGTH: 160                     # keep equal to training chunk length
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'INSIGHT'                  # consistent with your Aya pipeline
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: False
          DYNAMIC_DETECTION_FREQUENCY: 30
          USE_MEDIAN_FACE_BOX: False
      RESIZE:
        H: 128                              # match training resolution
        W: 128
DEVICE: cuda:0
NUM_OF_GPU_TRAIN: 1
LOG:
  PATH: runs/physformer
MODEL:
  DROP_RATE: 0.1
  NAME: PhysFormer
  PHYSFORMER:
    PATCH_SIZE: 4
    DIM: 96
    FF_DIM: 144
    NUM_HEADS: 4
    NUM_LAYERS: 12
    THETA: 0.7
INFERENCE:
  BATCH_SIZE: 4
  EVALUATION_METHOD: "FFT"                  # "FFT" or "peak detection"
  EVALUATION_WINDOW:
    USE_SMALLER_WINDOW: False
    WINDOW_SIZE: 10
  MODEL_PATH: ""
